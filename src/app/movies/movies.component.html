<app-movies-slider></app-movies-slider>
<section class="rendered-movies">
  <a
    [routerLink]="['/selected-movie']"
    [queryParams]="movie"
    class="each-movie"
    *ngFor="let movie of resultmovies"
  >
    <figure class="each-movie-figure">
      <img
        [src]="moviesPoster + movie.poster_path"
        [alt]="movie.title + ' Poster'"
      />
      <figcaption class="title">{{ movie.title }}</figcaption>
    </figure>
  </a>
</section>

<!-- navbar -->
<nav class="navbar d-flex" [class.z-index-0]="hideNavbar">
  <button type="button" (click)="hideNav(); sidenav.toggle()">
    <svg
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M1 1.5127H31"
        stroke="white"
        stroke-width="1.5"
        stroke-linecap="round"
      />
      <path
        d="M1 11.5127H31"
        stroke="white"
        stroke-width="1.5"
        stroke-linecap="round"
      />
      <path
        d="M1 21.5127H31"
        stroke="white"
        stroke-width="1.5"
        stroke-linecap="round"
      />
    </svg>
  </button>
  <a routerLink="/">
    <h2 class="nav-logo">PM</h2>
  </a>
  <div class="search-wrapper">
    <div class="search-inp-btn-wrapper" [class.show-input-search]="showSearch">
      <input
        type="text"
        placeholder="Search"
        class="search-input"
        #search
        [(ngModel)]="searchInput"
        minlength="1"
        (keyup.enter)="searchInput.length >= 1 && searchMovie()"
      />
      <!-- #searchTerm -->
      <button
        type="button"
        *ngIf="showSearch"
        class="close-button"
        (click)="closeSearchBar()"
      >
        <svg
          width="32"
          height="31"
          viewBox="0 0 32 31"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M23.6533 7.65381L8.34556 22.9616"
            stroke-width="2"
            stroke-linecap="round"
          />
          <path
            d="M23.5098 23.106L8.20201 7.7982"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
      </button>
    </div>
    <button
      type="button"
      *ngIf="!showSearch"
      (click)="searchMovie()"
      class="d-flex"
    >
      <svg
        width="24"
        height="22"
        viewBox="0 0 27 27"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M9 0.342773C13.968 0.342773 18 4.37477 18 9.34277C18 14.3108 13.968 18.3428 9 18.3428C4.032 18.3428 0 14.3108 0 9.34277C0 4.37477 4.032 0.342773 9 0.342773ZM9 16.3428C12.867 16.3428 16 13.2098 16 9.34277C16 5.47477 12.867 2.34277 9 2.34277C5.132 2.34277 2 5.47477 2 9.34277C2 13.2098 5.132 16.3428 9 16.3428ZM17 15.8428L19.6247 18.5348C20.0068 18.9267 20.0028 19.553 19.6158 19.94L19.5972 19.9586C19.2102 20.3456 18.5839 20.3496 18.192 19.9675L15.5 17.3428L17 15.8428Z"
        />
      </svg>
    </button>
  </div>
</nav>
